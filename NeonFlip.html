<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Flip - Retro Runner</title>
    <style>
        :root {
            --bg-color: #050508;
            --primary-color: #00f2ff;
            --accent-color: #ff007a;
            --ground-color: #1a1a2e;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            padding: 2vh;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            font-size: min(4vw, 20px);
            font-weight: bold;
            text-shadow: 2px 2px #000;
            letter-spacing: 2px;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: min(10vw, 64px);
            letter-spacing: 8px;
            text-shadow: 0 0 20px var(--primary-color);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: min(5vw, 24px);
            background: var(--accent-color);
            border: none;
            color: white;
            cursor: pointer;
            font-family: inherit;
            border-radius: 4px;
            box-shadow: 0 5px 0 #b30056;
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b30056;
        }

        #fullscreenBtn {
            background: #444;
            box-shadow: 0 5px 0 #222;
            font-size: 14px;
            padding: 8px 20px;
        }

        .seed-container {
            margin-top: 20px;
            font-size: 10px;
            color: #666;
        }

        .seed-input {
            background: transparent;
            border: 1px solid #333;
            color: var(--primary-color);
            padding: 5px;
            text-align: center;
            font-family: inherit;
            margin-top: 5px;
        }

        @media screen and (orientation: portrait) {
            #portrait-warning {
                display: flex;
            }
        }

        #portrait-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: var(--primary-color);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div id="portrait-warning">
    <h2>ROTATE DEVICE</h2>
    <p>Please use Landscape mode for the best experience.</p>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div class="hud">
            <div>SCORE: <span id="scoreVal">0</span></div>
            <div>BEST: <span id="highScoreVal">0</span></div>
        </div>
    </div>

    <div id="overlay">
        <h1 id="titleText">NEON FLIP</h1>
        <p id="msgText" style="color: #888; font-size: 12px; margin: 10px 0;">HOLD CLICK/SPACE TO JUMP</p>
        
        <div class="btn-group">
            <button id="startBtn">START SYSTEM</button>
            <button id="fullscreenBtn">GO FULLSCREEN</button>
        </div>

        <div class="seed-container">
            SYSTEM SEED<br>
            <input type="text" id="seedInput" class="seed-input" value="12345" maxlength="10">
        </div>
    </div>
</div>

<script>
/**
 * ADVANCED CHIPTUNE ENGINE - SECTION BASED
 */
class ChiptuneEngine {
    constructor() {
        this.ctx = null;
        this.masterVolume = null;
        this.isPlaying = false;
        
        // C64 Scale: C Minor Pentatonic / Blues
        this.notes = [130.81, 155.56, 174.61, 185.00, 196.00, 233.08]; 
        this.step = 0;
        this.pattern = 0; // 0: Intro, 1: Chorus, 2: Breakdown, 3: Peak
    }

    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterVolume = this.ctx.createGain();
        this.masterVolume.gain.value = 0.15;
        this.masterVolume.connect(this.ctx.destination);
    }

    // Classic Pulse Width Modulation (PWM) Lead
    playPWM(freq, time, duration, vol) {
        const osc = this.ctx.createOscillator();
        const pwm = this.ctx.createOscillator();
        const pwmGain = this.ctx.createGain();
        
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, time);
        
        // PWM simulation
        pwm.frequency.setValueAtTime(5, time); // 5Hz wobble
        pwmGain.gain.setValueAtTime(0.002, time);
        pwm.connect(pwmGain);
        pwmGain.connect(osc.frequency);

        const env = this.ctx.createGain();
        env.gain.setValueAtTime(vol, time);
        env.gain.exponentialRampToValueAtTime(0.0001, time + duration);
        
        osc.connect(env);
        env.connect(this.masterVolume);
        
        pwm.start(time);
        osc.start(time);
        pwm.stop(time + duration);
        osc.stop(time + duration);
    }

    playKick(time) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.frequency.setValueAtTime(120, time);
        osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.15);
        gain.gain.setValueAtTime(0.6, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
        osc.connect(gain);
        gain.connect(this.masterVolume);
        osc.start(time);
        osc.stop(time + 0.15);
    }

    playSnare(time) {
        const bufferSize = this.ctx.sampleRate * 0.1;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const noiseEnvelope = this.ctx.createGain();
        noiseEnvelope.gain.setValueAtTime(0.2, time);
        noiseEnvelope.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
        noise.connect(noiseEnvelope);
        noiseEnvelope.connect(this.masterVolume);
        noise.start(time);
    }

    tick() {
        if (!this.isPlaying) return;
        const now = this.ctx.currentTime;
        const tempo = 132;
        const duration = 60 / tempo; // Beat length
        const subStep = this.step % 16;
        
        // Section logic
        if (this.step % 64 === 0) {
            this.pattern = (this.pattern + 1) % 4;
        }

        // Drums (Standard on Chorus and Peak)
        if (this.pattern !== 2) { // Skip drums during breakdown
            if (subStep % 4 === 0) this.playKick(now);
            if (subStep % 4 === 2) this.playSnare(now);
        }

        // Bassline
        const bassFreq = this.notes[this.pattern === 1 ? (subStep % 3) : 0] / 2;
        this.playPWM(bassFreq, now, duration * 0.5, 0.1);

        // Arpeggios / Melodies
        if (this.pattern === 1 || this.pattern === 3) { // Chorus or Peak
            const arpFreq = this.notes[Math.floor(Math.random() * this.notes.length)] * 2;
            this.playPWM(arpFreq, now, duration * 0.2, 0.08);
        } else if (this.pattern === 0) { // Intro Buildup
            if (subStep % 8 === 0) {
                this.playPWM(this.notes[0] * 2, now, duration * 2, 0.05);
            }
        }

        this.step++;
        setTimeout(() => this.tick(), (duration * 250)); // Tick every 16th note approx
    }

    // NEW Retro "Sproing" Jump Sound
    playJump() { 
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const duration = 0.2;
        
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'square';
        // Start low, sweep high rapidly for that "spring" feel
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + duration);
        
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        
        osc.connect(gain);
        gain.connect(this.masterVolume);
        
        osc.start(now);
        osc.stop(now + duration);
    }

    playDeath() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(10, this.ctx.currentTime + 1.5);
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.3, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.5);
        osc.connect(g);
        g.connect(this.masterVolume);
        osc.start();
        osc.stop(this.ctx.currentTime + 1.5);
    }

    start() {
        this.init();
        if (this.isPlaying) return;
        this.isPlaying = true;
        this.tick();
    }
}

/**
 * GAME ENGINE
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreVal');
const highScoreEl = document.getElementById('highScoreVal');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const fsBtn = document.getElementById('fullscreenBtn');
const seedInput = document.getElementById('seedInput');

function resize() {
    canvas.width = 800;
    canvas.height = 450;
}
window.addEventListener('resize', resize);
resize();

fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            console.warn(`Error attempting to enable full-screen mode: ${err.message}`);
        });
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    } else {
        document.exitFullscreen();
    }
});

class SeededRandom {
    constructor(seed) { this.seed = this.hashString(seed.toString()); }
    hashString(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i);
        return hash | 0;
    }
    next() {
        this.seed ^= this.seed << 13;
        this.seed ^= this.seed >> 17;
        this.seed ^= this.seed << 5;
        return (this.seed < 0 ? ~this.seed + 1 : this.seed) / 2147483647;
    }
}

const audio = new ChiptuneEngine();
let gameState = 'MENU';
let score = 0;
let highScore = localStorage.getItem('neonFlipHighScore') || 0;
highScoreEl.innerText = highScore;

const GROUND_Y = 380;
const MAX_PILLAR_HEIGHT = 85;

let player = {
    x: 120, y: 0, width: 34, height: 34,
    vy: 0, gravity: 0.52, jumpStrength: -12.5,
    rotation: 0, targetRotation: 0, isGrounded: false
};

let obstacles = [];
let gameSpeed = 3.8; 
let distanceTraveled = 0;
let nextObstacleX = 1000;
let rng = null;
let isInputHeld = false;

function initGame() {
    score = 0;
    distanceTraveled = 0;
    gameSpeed = 4.0; 
    player.y = GROUND_Y - player.height;
    player.vy = 0;
    player.rotation = 0;
    player.targetRotation = 0;
    player.isGrounded = true;
    obstacles = [];
    nextObstacleX = 1000;
    rng = new SeededRandom(seedInput.value || "12345");
    scoreEl.innerText = score;
    gameState = 'PLAYING';
    overlay.style.display = 'none';
    audio.start();
}

function jump() {
    if (player.isGrounded) {
        player.vy = player.jumpStrength;
        player.isGrounded = false;
        player.targetRotation += Math.PI / 2;
        audio.playJump();
    }
}

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        isInputHeld = true;
        if (gameState === 'MENU' || gameState === 'GAMEOVER') initGame();
    }
});
window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') isInputHeld = false;
});

canvas.addEventListener('mousedown', () => {
    isInputHeld = true;
    if (gameState === 'MENU' || gameState === 'GAMEOVER') initGame();
});
window.addEventListener('mouseup', () => {
    isInputHeld = false;
});

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    isInputHeld = true;
    if (gameState === 'MENU' || gameState === 'GAMEOVER') initGame();
}, {passive: false});
window.addEventListener('touchend', () => {
    isInputHeld = false;
});

startBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    initGame();
});

function spawnObstacle() {
    const difficulty = Math.min(distanceTraveled / 30000, 1);
    const roll = rng.next();
    let type = roll > 0.4 ? 'PILLAR' : 'SPIKE';
    
    let obstacle = {
        x: nextObstacleX,
        y: GROUND_Y,
        type: type,
        width: 45 + (rng.next() * 20),
        height: type === 'PILLAR' ? 40 + (rng.next() * MAX_PILLAR_HEIGHT) : 42
    };
    
    if (type === 'PILLAR') obstacle.y -= obstacle.height;
    else obstacle.y -= obstacle.height;

    obstacles.push(obstacle);
    
    const baseGap = 160;
    const variGap = (rng.next() * 200);
    const difficultyTighten = difficulty * 80;
    nextObstacleX += obstacle.width + Math.max(100, baseGap + variGap - difficultyTighten);
}

function update() {
    if (gameState !== 'PLAYING') return;

    if (isInputHeld && player.isGrounded) jump();

    player.vy += player.gravity;
    player.y += player.vy;
    
    let onSomething = false;

    if (player.y + player.height > GROUND_Y) {
        player.y = GROUND_Y - player.height;
        player.vy = 0;
        onSomething = true;
    }

    distanceTraveled += gameSpeed;
    gameSpeed += 0.0003; 
    score = Math.floor(distanceTraveled / 10);
    scoreEl.innerText = score;

    if (nextObstacleX < distanceTraveled + 800) {
        spawnObstacle();
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        const screenX = obs.x - distanceTraveled + player.x;

        if (player.x + player.width > screenX + 5 && player.x < screenX + obs.width - 5) {
            if (obs.type === 'PILLAR') {
                const foot = player.y + player.height;
                const prevFoot = foot - player.vy;
                
                if (prevFoot <= obs.y + 12 && foot >= obs.y && player.vy >= 0) {
                    player.y = obs.y - player.height;
                    player.vy = 0;
                    onSomething = true;
                } else if (foot > obs.y + 12 && player.y < obs.y + obs.height) {
                    gameOver();
                }
            } else {
                if (player.y + player.height > obs.y + 12) gameOver();
            }
        }
        if (screenX + obs.width < -100) obstacles.splice(i, 1);
    }

    if (onSomething) {
        if (!player.isGrounded) {
            player.rotation = Math.round(player.rotation / (Math.PI/2)) * (Math.PI/2);
            player.targetRotation = player.rotation;
        }
        player.isGrounded = true;
    } else {
        player.isGrounded = false;
        player.rotation += (player.targetRotation - player.rotation) * 0.16;
    }
}

function gameOver() {
    gameState = 'GAMEOVER';
    isInputHeld = false;
    audio.playDeath();
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('neonFlipHighScore', highScore);
        highScoreEl.innerText = highScore;
    }
    document.getElementById('titleText').innerText = "LINK LOST";
    document.getElementById('msgText').innerText = `DISTANCE: ${score}`;
    startBtn.innerText = "RE-INITIALIZE";
    overlay.style.display = 'flex';
}

function draw() {
    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = '#101018';
    ctx.lineWidth = 1;
    const scrollX = (distanceTraveled % 60);
    for (let x = -scrollX; x < canvas.width; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }

    ctx.fillStyle = '#08080c';
    ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    ctx.strokeStyle = '#1a1a25';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(canvas.width, GROUND_Y); ctx.stroke();

    obstacles.forEach(obs => {
        const screenX = obs.x - distanceTraveled + player.x;
        ctx.save();
        if (obs.type === 'PILLAR') {
            ctx.fillStyle = '#ff007a';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff007a';
            ctx.fillRect(screenX, obs.y, obs.width, obs.height);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.strokeRect(screenX + 4, obs.y + 4, obs.width - 8, obs.height - 8);
        } else {
            ctx.fillStyle = '#ffcc00';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ffcc00';
            ctx.beginPath();
            ctx.moveTo(screenX, obs.y + obs.height);
            ctx.lineTo(screenX + obs.width / 2, obs.y);
            ctx.lineTo(screenX + obs.width, obs.y + obs.height);
            ctx.closePath(); ctx.fill();
        }
        ctx.restore();
    });

    ctx.save();
    ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
    ctx.rotate(player.rotation);
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#00f2ff';
    ctx.fillStyle = '#00f2ff';
    ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.strokeRect(-player.width / 2 + 4, -player.height / 2 + 4, player.width - 8, player.height - 8);
    ctx.restore();

    requestAnimationFrame(() => {
        update();
        draw();
    });
}
draw();
</script>
</body>
</html>
