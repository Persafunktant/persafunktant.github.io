<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Grid</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
        <button id="btn-fullscreen" class="sys-btn fullscreen-btn">⛶</button>
        <button id="btn-pause" class="sys-btn pause-btn" style="display:none;">⏸ PAUSE</button>

        <div id="main-menu" class="menu-overlay">
            <h1 class="game-title">GRAVITY GRID</h1>
            <button id="btn-resume" class="menu-btn" style="display:none;">RESUME</button>
            <button id="btn-start" class="menu-btn">NEW GAME</button>
            <button id="btn-options" class="menu-btn">OPTIONS</button>
        </div>
    </div>

    <!-- Loading scripts in order -->
    <script src="js/levels.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
