<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Grid</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
        <button id="btn-fullscreen" class="sys-btn fullscreen-btn">⛶</button>
        <button id="btn-pause" class="sys-btn pause-btn" style="display:none;">⏸ PAUSE</button>

        <div id="main-menu" class="menu-overlay">
            <h1 class="game-title">GRAVITY GRID</h1>
            <button id="btn-resume" class="menu-btn" style="display:none;">RESUME</button>
            <button id="btn-restart-level" class="menu-btn" style="display:none;">RESTART LEVEL</button>
            <button id="btn-restart-game" class="menu-btn">NEW GAME</button>
            <button id="btn-options" class="menu-btn">OPTIONS</button>
        </div>

        <div id="options-menu" class="menu-overlay" style="display:none;">
            <h2 class="menu-title">OPTIONS</h2>
            
            <div class="option-row">
                <label>MUSIC VOLUME</label>
                <input type="range" id="slider-volume" min="0" max="0.5" step="0.01" value="0.15">
            </div>

            <div class="option-row">
                <label>PARTICLES</label>
                <input type="checkbox" id="check-particles" checked>
            </div>

            <div class="option-row">
                <label>SCREEN SHAKE</label>
                <input type="checkbox" id="check-shake" checked>
            </div>

            <button id="btn-options-back" class="menu-btn">BACK</button>
        </div>
    </div>

    <!-- Loading scripts in order -->
    <script src="js/levels.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
