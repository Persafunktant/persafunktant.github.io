<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gravity Grid - Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Outfit', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar UI */
        #sidebar {
            width: 280px;
            background: #111;
            border-right: 2px solid #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        h1 { margin-top: 0; font-size: 24px; color: #00f2ff; text-align: center; letter-spacing: 1px; }

        .tools { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        
        .tool-btn {
            background: #222; border: 2px solid #444; color: #fff;
            padding: 10px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; gap: 15px;
            font-size: 16px; font-weight: 700; font-family: 'Outfit';
            transition: 0.2s;
        }
        .tool-btn:hover { background: #333; }
        .tool-btn.active { border-color: #00f2ff; background: #00f2ff33; box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        
        .color-box { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #fff; }

        .export-section {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 20px;
            border-top: 2px solid #333;
        }

        input, select {
            background: #000; border: 2px solid #444; color: #fff;
            padding: 12px; border-radius: 8px; font-family: 'Outfit'; font-size: 16px; font-weight: bold;
        }
        select { cursor: pointer; }

        .action-btn {
            background: #00f2ff; color: #000; border: none;
            padding: 15px; border-radius: 8px; font-size: 18px; font-weight: 900;
            cursor: pointer; text-transform: uppercase;
        }
        .action-btn:hover { filter: brightness(1.2); }
        
        .clear-btn { background: #ff3333; color: #fff; }

        /* Canvas Area */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: #050508;
            cursor: crosshair;
        }
        canvas { display: block; }
        
        #hud {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px;
            font-family: monospace; font-size: 14px; color: #aaa; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>LEVEL EDITOR</h1>
        
        <div class="tools" id="tool-container">
            <button class="tool-btn active" data-id="1"><div class="color-box" style="background:#00f2ff;"></div> Platform A</button>
            <button class="tool-btn" data-id="2"><div class="color-box" style="background:#ff007a;"></div> Platform B</button>
            <button class="tool-btn" data-id="3"><div class="color-box" style="background:#ffcc00;"></div> Platform C</button>
            <button class="tool-btn" data-id="4"><div class="color-box" style="background:#ff3333; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); border:none;"></div> Spike Up</button>
            <button class="tool-btn" data-id="5"><div class="color-box" style="background:#ff3333; clip-path: polygon(50% 100%, 0% 0%, 100% 0%); border:none;"></div> Spike Down</button>
            <button class="tool-btn" data-id="6"><div class="color-box" style="background:#666; border: 1px dashed #fff;"></div> Crumbling</button>
            <button class="tool-btn" data-id="0"><div class="color-box" style="background:#000;"></div> Eraser</button>
        </div>

        <div class="export-section">
            <select id="levelSelect"></select>
            <button class="action-btn" style="background:#ffcc00;" onclick="loadLevel()">Load Level</button>
            <hr style="width: 100%; border-color: #333; margin: 10px 0;">
            <input type="text" id="levelName" value="Level 1" placeholder="Level Name">
            <button class="action-btn" onclick="exportData()">Export Data</button>
            <button class="action-btn clear-btn" onclick="clearGrid()">Clear Level</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">Scroll: 0</div>
    </div>

    <script src="js/levels.js"></script>
    <script>
        // --- Core Data ---
        // GRID_W and GRID_H are loaded from levels.js
        const TILE_SIZE = 40;

        let levelData = [];
        let selectedTile = 1;
        let scrollX = 0;
        let isPainting = false;

        // --- Level Loading ---
        window.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('levelSelect');
            if (typeof LEVELS !== 'undefined') {
                for (let key in LEVELS) {
                    let opt = document.createElement('option');
                    opt.value = key;
                    opt.innerText = key;
                    select.appendChild(opt);
                }
            } else {
                let opt = document.createElement('option');
                opt.innerText = "No Levels Found";
                select.appendChild(opt);
            }
        });

        function loadLevel() {
            const name = document.getElementById('levelSelect').value;
            if (typeof LEVELS !== 'undefined' && LEVELS[name]) {
                levelData = JSON.parse(JSON.stringify(LEVELS[name]));
                document.getElementById('levelName').value = name;
                scrollX = 0;
            } else {
                alert("Level not found.");
            }
        }

        // --- Init Grid ---
        function initData() {
            levelData = [];
            for (let y = 0; y < GRID_H; y++) {
                let row = [];
                for (let x = 0; x < GRID_W; x++) {
                    if (y === 0 || y === GRID_H - 1) row.push(1); // Floor/Ceiling
                    else row.push(0);
                }
                levelData.push(row);
            }
        }
        initData();

        // --- Canvas Setup ---
        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Input Handling ---
        // UI Selection
        const btns = document.querySelectorAll('.tool-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTile = parseInt(btn.getAttribute('data-id'));
            });
        });

        // Mouse Painting Coordinates
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const gridX = Math.floor((mouseX + scrollX) / TILE_SIZE);
            const gridY = Math.floor(mouseY / TILE_SIZE);
            return { x: gridX, y: gridY };
        }

        function paint(e) {
            if (!isPainting) return;
            const cord = getCoords(e);
            if (cord.x >= 0 && cord.x < GRID_W && cord.y >= 0 && cord.y < GRID_H) {
                levelData[cord.y][cord.x] = selectedTile;
            }
        }

        canvas.addEventListener('mousedown', (e) => { isPainting = true; paint(e); });
        canvas.addEventListener('mousemove', paint);
        window.addEventListener('mouseup', () => isPainting = false);

        // Scrolling
        window.addEventListener('wheel', (e) => {
            scrollX += e.deltaY;
            scrollX = Math.max(0, Math.min(scrollX, (GRID_W * TILE_SIZE) - canvas.width));
        });
        window.addEventListener('keydown', (e) => {
            if (document.activeElement === document.getElementById('levelName')) return; // Don't scroll when typing
            if (e.key === 'ArrowRight' || e.key === 'd') scrollX += 100;
            if (e.key === 'ArrowLeft' || e.key === 'a') scrollX -= 100;
            scrollX = Math.max(0, Math.min(scrollX, (GRID_W * TILE_SIZE) - canvas.width));
        });

        // --- Export ---
        function exportData() {
            const name = document.getElementById('levelName').value.trim() || 'New Level';
            // Minify JSON totally
            const jsonStr = JSON.stringify(levelData);
            const finalStr = `"${name}": ${jsonStr},`;
            
            navigator.clipboard.writeText(finalStr).then(() => {
                alert(`SUCCESS!\n\nCopied minified data for "${name}" to clipboard.\nPaste directly into js/levels.js.`);
            }).catch(err => alert("Copy failed. Check console."));
        }

        function clearGrid() {
            if (confirm("Are you sure you want to clear the level?")) {
                initData();
            }
        }

        // --- Render Loop ---
        function render() {
            // Background
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-Math.floor(scrollX), 0);

            // Grid Layout (Only draw what's visible)
            const startCol = Math.floor(scrollX / TILE_SIZE);
            const endCol = startCol + Math.ceil(canvas.width / TILE_SIZE) + 1;

            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;

            // Vert Lines
            for (let x = startCol; x <= endCol; x++) {
                if (x > GRID_W) break;
                ctx.beginPath();
                ctx.moveTo(x * TILE_SIZE, 0);
                ctx.lineTo(x * TILE_SIZE, GRID_H * TILE_SIZE);
                ctx.stroke();
            }
            // Horiz Lines
            for (let y = 0; y <= GRID_H; y++) {
                ctx.beginPath();
                ctx.moveTo(startCol * TILE_SIZE, y * TILE_SIZE);
                ctx.lineTo(endCol * TILE_SIZE, y * TILE_SIZE);
                ctx.stroke();
            }

            // Draw Level Data
            for (let y = 0; y < GRID_H; y++) {
                for (let x = startCol; x <= endCol; x++) {
                    if (x >= GRID_W) break;
                    const tile = levelData[y][x];
                    if (tile === 0) continue;

                    const pX = x * TILE_SIZE;
                    const pY = y * TILE_SIZE;
                    const TS = TILE_SIZE;

                    ctx.save();
                    ctx.translate(pX, pY);

                    if (tile === 1 || tile === 2 || tile === 3) {
                        ctx.fillStyle = (tile===1) ? '#00f2ff' : (tile===2) ? '#ff007a' : '#ffcc00';
                        ctx.fillRect(1, 1, TS-2, TS-2);
                        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(4, 4, TS-8, TS-8);
                    } else if (tile === 4) { // Spike Up
                        ctx.fillStyle = '#ff3333';
                        ctx.beginPath();
                        ctx.moveTo(TS/2, 4); ctx.lineTo(4, TS-4); ctx.lineTo(TS-4, TS-4);
                        ctx.fill();
                    } else if (tile === 5) { // Spike Down
                        ctx.fillStyle = '#ff3333';
                        ctx.beginPath();
                        ctx.moveTo(TS/2, TS-4); ctx.lineTo(4, 4); ctx.lineTo(TS-4, 4);
                        ctx.fill();
                    } else if (tile === 6) { // Crumble
                        ctx.fillStyle = '#666';
                        ctx.fillRect(2, 2, TS-4, TS-4);
                        ctx.strokeStyle = '#aaa'; 
                        ctx.lineWidth = 1;
                        ctx.strokeRect(6, 6, TS-12, TS-12);
                    }

                    ctx.restore();
                }
            }

            ctx.restore();

            document.getElementById('hud').innerText = `Scroll X: ${Math.floor(scrollX)}px | Tile X: ${startCol} / ${GRID_W}`;

            requestAnimationFrame(render);
        }

        // Start Loop
        requestAnimationFrame(render);

    </script>
</body>
</html>
